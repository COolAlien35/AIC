server {
  listen 7860;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache immutable assets aggressively (plots are content-addressed by git).
  location ~* \.(png|jpg|jpeg|gif|svg|webp|css|js)$ {
    add_header Cache-Control "public, max-age=86400, immutable";
    try_files $uri =404;
  }

  # Single page app-friendly fallback (even though this dashboard is multi-section, same page).
  location / {
    try_files $uri $uri/ /index.html;
  }
}

